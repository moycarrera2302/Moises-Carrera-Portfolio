<html lang="en" data-screen-label="Portfolio App">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="src/styles.css">
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <rect width="400" height="400" fill="#0A0E1A"/>
    <g stroke="#1D9E75" stroke-width="2" fill="none">
      <path d="M 80 140 L 180 140 L 200 160 L 320 160"/>
      <path d="M 80 200 L 140 200 L 160 220 L 320 220"/>
      <path d="M 80 260 L 220 260 L 240 280 L 320 280"/>
    </g>
    <circle cx="180" cy="140" r="5" fill="#0F7B9A"/>
    <circle cx="140" cy="200" r="5" fill="#1D9E75"/>
    <circle cx="220" cy="260" r="5" fill="#0F7B9A"/>
    <text x="200" y="360" fill="#F5F3EE" font-family="serif" font-size="34" text-anchor="middle" font-style="italic">MC</text>
  </svg>
</template>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/hero.jsx"></script>
<script type="text/babel" src="src/pages-intro.jsx"></script>
<script type="text/babel" src="src/pages-projects.jsx"></script>
<script type="text/babel" src="src/pages-extra.jsx"></script>
<script type="text/babel" src="src/page-mabe.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function Shell() {
  const route = useHashRoute();
  useAccentCss();

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' }); }, [route]);

  let Page;
  let darkFooter = false;
  if (route === '/' || route === '') { Page = Hero; darkFooter = true; }
  else if (route.startsWith('/about')) Page = AboutPage;
  else if (route.startsWith('/timeline')) Page = TimelinePage;
  else if (route.startsWith('/mabe')) { Page = MabePage; darkFooter = true; }
  else if (route.startsWith('/irish')) Page = IrishPage;
  else if (route.startsWith('/idealab')) Page = IdeaLabPage;
  else if (route.startsWith('/innova')) Page = InnovaPage;
  else if (route.startsWith('/alcar')) Page = AlcarPage;
  else if (route.startsWith('/tycho')) Page = TychoPage;
  else if (route.startsWith('/baja')) Page = BajaPage;
  else if (route.startsWith('/education')) Page = EducationPage;
  else if (route.startsWith('/certifications')) Page = EducationPage;
  else Page = Hero;

  return (
    <div className="app">
      <CursorTrace />
      <Nav route={route} />
      <div key={route}>
        <Page />
        <Footer dark={darkFooter} />
      </div>
    </div>
  );
}

function App() {
  return (
    <TweaksProvider>
      <Shell />
    </TweaksProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
